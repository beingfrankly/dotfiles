# Nordic theme for lazydocker
# Copy or symlink to: ~/Library/Application Support/lazydocker/config.yml (macOS)
# Or use: ~/.config/lazydocker/config.yml (Linux)

gui:
  theme:
    activeBorderColor:
      - '#81A1C1'  # blue1
      - bold
    inactiveBorderColor:
      - '#353B4A'  # gray2 - darker
    optionsTextColor:
      - '#88C0D0'  # blue2
    selectedLineBgColor:
      - '#353B4A'  # gray2 - darker
    selectedRangeBgColor:
      - '#353B4A'  # gray2 - darker
    defaultFgColor:
      - '#D8DEE9'  # white1
    searchingActiveBorderColor:
      - '#EBCB8B'  # yellow

  # Container state colors
  containerStatusColors:
    running:
      - '#A3BE8C'  # green
    paused:
      - '#EBCB8B'  # yellow
    stopped:
      - '#BF616A'  # red
    exited:
      - '#60728A'  # gray5
    dead:
      - '#BF616A'  # red
    created:
      - '#88C0D0'  # blue2

  # Stats colors
  stats:
    cpu:
      - '#88C0D0'  # blue2
    memory:
      - '#B48EAD'  # magenta

# Color reference (10% increased contrast):
# Background: #1B1F26 (black1) - darker
# Selection: #353B4A (gray2) - darker
# Border: #353B4A (gray2)
# Blue: #81A1C1 / #88C0D0
# Green (running): #A3BE8C
# Red (error/stopped): #BF616A
# Yellow (warning): #EBCB8B
# Magenta: #B48EAD
# White: #DCE1EB
# Gray: #60728A
